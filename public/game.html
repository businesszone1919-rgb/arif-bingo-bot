<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arif Bingo - Realtime</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root { --bg: #3e2723; --primary: #795548; --accent: #ffd700; --panel: #5d4037; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; color: white; text-align: center; }
        .header-bar { display: flex; justify-content: space-between; background: rgba(0,0,0,0.2); padding: 10px; }
        .stats-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; padding: 10px; }
        .stat-box { background: var(--panel); border-radius: 5px; padding: 5px; font-size: 0.7rem; border: 1px solid #795548; }
        .stat-box b { display: block; color: var(--accent); font-size: 0.9rem; }
        
        .game-area { display: flex; flex-direction: column; align-items: center; padding: 10px; }
        .called-number-display { background: white; color: #3e2723; width: 80px; height: 80px; border-radius: 50%; font-size: 2.5rem; font-weight: bold; line-height: 80px; margin-bottom: 20px; border: 5px solid var(--accent); }
        
        .bingo-card { background: #512da8; padding: 10px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .bingo-card-header { display: grid; grid-template-columns: repeat(5, 1fr); color: #81d4fa; font-weight: bold; font-size: 1.2rem; padding-bottom: 5px; }
        .bingo-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 3px; background: white; padding: 5px; border-radius: 5px; }
        .bingo-cell { width: 45px; height: 45px; background: #fff8e1; color: #333; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 1.1rem; border-radius: 3px; cursor: pointer; border: 1px solid #ddd; }
        .bingo-cell.marked { background: #4caf50 !important; color: white !important; }
        .bingo-cell i { color: var(--accent); font-size: 1.5rem; }

        .control-bar { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 20px; }
        .btn { border: none; padding: 12px; border-radius: 5px; font-weight: bold; cursor: pointer; color: white; }
        .btn-leave { background: #e64a19; }
        .btn-refresh { background: #fbc02d; color: #333; }
        .btn-auto { background: #8bc34a; }
        .btn-auto.active { background: #2e7d32; box-shadow: inset 0 0 10px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

<div class="header-bar">
    <button class="btn" style="background:var(--panel); padding: 5px 15px;"><i class="fas fa-arrow-left"></i> Back</button>
    <h3 style="margin:0; color:var(--accent);">Arif Bingo</h3>
    <button class="btn" style="background:var(--panel); padding: 5px 15px;">Refresh <i class="fas fa-sync-alt"></i></button>
</div>

<div class="stats-grid">
    <div class="stat-box">Main Wallet<b id="mainWallet">100</b></div>
    <div class="stat-box">Play Wallet<b id="playWallet">0</b></div>
    <div class="stat-box">Stake<b id="stake">10</b></div>
    <div class="stat-box">Derash<b id="derash">0</b></div>
    <div class="stat-box">Players<b id="playersCount">0</b></div>
</div>

<div class="game-area">
    <div class="called-number-display" id="currentNumber">--</div>
    
    <div class="bingo-card">
        <div class="bingo-card-header">
            <div>B</div><div>I</div><div>N</div><div>G</div><div>O</div>
        </div>
        <div class="bingo-grid" id="bingoGrid">
            </div>
    </div>
</div>

<div class="control-bar">
    <button class="btn btn-leave">Leave</button>
    <button class="btn btn-refresh">Refresh</button>
    <button class="btn btn-auto" id="autoBtn">Automatic</button>
</div>

<script>
    const socket = io();
    let myCard = [];
    let calledNumbers = [];
    let isAutomatic = false;

    socket.on('initGame', (data) => {
        document.getElementById('derash').innerText = data.gameState.derash;
        document.getElementById('stake').innerText = data.gameState.bet;
        document.getElementById('mainWallet').innerText = data.myInfo.mainWallet;
        renderCard(data.myInfo.card);
    });

    socket.on('updateStats', (data) => {
        document.getElementById('playersCount').innerText = data.players;
        document.getElementById('derash').innerText = data.derash;
    });

    socket.on('nextNumber', (data) => {
        calledNumbers = data.calledNumbers;
        document.getElementById('currentNumber').innerText = 'N-' + data.number;
        if(isAutomatic) {
            autoMark(data.number);
        }
    });

    function renderCard(card) {
        const grid = document.getElementById('bingoGrid');
        grid.innerHTML = '';
        myCard = card;
        
        // ካርቴላውን ከላይ ወደ ታች ለመደርደር (B,I,N,G,O cols)
        for (let r=0; r<5; r++) {
            for (let c=0; c<5; c++) {
                const cell = document.createElement('div');
                cell.className = 'bingo-cell';
                let val = card[c][r]; // columnar to row-major
                
                if (val === 'STAR') {
                    cell.innerHTML = '<i class="fas fa-star"></i>';
                    cell.classList.add('marked');
                } else {
                    cell.innerText = val;
                    cell.id = 'cell-' + val;
                    cell.onclick = () => manualMark(val);
                }
                grid.appendChild(cell);
            }
        }
    }

    function manualMark(num) {
        if (calledNumbers.includes(num)) {
            document.getElementById('cell-' + num).classList.add('marked');
        }
    }

    function autoMark(num) {
        // የኔ ካርቴላ ውስጥ ያለውን ቁጥር ፈልግ
        for(let c=0; c<5; c++) {
            for(let r=0; r<5; r++) {
                if(myCard[c][r] === num) {
                    const el = document.getElementById('cell-' + num);
                    if(el) el.classList.add('marked');
                }
            }
        }
    }

    document.getElementById('autoBtn').onclick = function() {
        isAutomatic = !isAutomatic;
        this.classList.toggle('active');
        // ካለፉት ቁጥሮች ውስጥ ያሉትን ማርክ አድርግ
        if(isAutomatic) {
            calledNumbers.forEach(n => autoMark(n));
        }
    };
</script>

</body>
</html>
