<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arif Bingo - Game Board</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root { --bg: #3e2723; --panel: #5d4037; --accent: #ffd700; --white: #ffffff; --green: #8bc34a; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; padding: 0; color: white; text-align: center; }
        
        .header-bar { display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.3); padding: 10px; border-bottom: 2px solid #5d4037; }
        .back-btn, .refresh-btn { background: #5d4037; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; }
        
        .stats-container { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; padding: 10px; }
        .stat-item { background: var(--panel); border: 1px solid #795548; border-radius: 5px; padding: 5px; font-size: 0.7rem; color: #bcaaa4; }
        .stat-item b { display: block; color: var(--accent); font-size: 0.9rem; margin-top: 2px; }
        
        .called-number-view { background: #fff8e1; color: var(--bg); width: 85px; height: 85px; border-radius: 50%; font-size: 2.5rem; font-weight: bold; line-height: 85px; margin: 15px auto; border: 6px solid var(--accent); box-shadow: 0 4px 8px rgba(0,0,0,0.4); }
        
        .card-wrapper { background: #5e35b1; padding: 12px; border-radius: 12px; display: inline-block; margin-bottom: 20px; }
        .bingo-header { display: grid; grid-template-columns: repeat(5, 1fr); color: #81d4fa; font-size: 1.4rem; font-weight: bold; padding-bottom: 5px; }
        .bingo-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 3px; background: white; padding: 5px; border-radius: 5px; }
        .cell { width: 45px; height: 45px; background: #fffde7; color: #333; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 1.2rem; border-radius: 3px; cursor: pointer; border: 1px solid #e0e0e0; }
        .cell.marked { background: #4caf50 !important; color: white !important; }
        
        .controls-panel { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 15px; background: rgba(0,0,0,0.2); }
        .control-btn { border: none; padding: 12px; border-radius: 6px; font-weight: bold; color: white; cursor: pointer; }
        .btn-leave { background: #e64a19; }
        .btn-refresh { background: #fbc02d; color: #333; }
        .btn-auto { background: var(--green); }
        .btn-auto.active { background: #1b5e20; border: 2px solid var(--accent); }
    </style>
</head>
<body>

<div class="header-bar">
    <button class="back-btn" onclick="window.location.href='/'"><i class="fas fa-arrow-left"></i> Back</button>
    <h2 style="margin: 0; color:var(--accent);">Arif Bingo</h2>
    <button class="refresh-btn" onclick="location.reload()">Refresh <i class="fas fa-sync-alt"></i></button>
</div>

<div class="stats-container">
    <div class="stat-item">Game ID<b id="gameId">#BBDDNWIX</b></div>
    <div class="stat-item">Players<b id="playersCount">--</b></div>
    <div class="stat-item">Bet<b>10</b></div>
    <div class="stat-item">Derash<b id="derash">--</b></div>
    <div class="stat-item">Called<b id="calledNumbersCount">0</b></div>
</div>

<div class="called-number-view" id="calledNumber">--</div>

<div class="card-wrapper">
    <div class="bingo-header">
        <div>B</div><div>I</div><div>N</div><div>G</div><div>O</div>
    </div>
    <div class="bingo-grid" id="bingoGrid">
        </div>
</div>

<div class="controls-panel">
    <button class="control-btn btn-leave" onclick="window.location.href='/'">Leave</button>
    <button class="control-btn btn-refresh" onclick="location.reload()">Refresh</button>
    <button class="control-btn btn-auto" id="autoBtn">Automatic</button>
</div>

<script>
    // ግንኙነቱን Render ላይ በትክክል እንዲሰራ ማድረግ
    const socket = io(); 
    let isAutomatic = false;
    let myCardNumbers = [];
    let alreadyCalled = [];

    // ካርቴላ ማመንጫ
    function generateBingoCard() {
        const grid = document.getElementById('bingoGrid');
        grid.innerHTML = '';
        myCardNumbers = [];
        const ranges = [[1,15],[16,30],[31,45],[46,60],[61,75]];

        for(let r=0; r<5; r++) {
            for(let c=0; c<5; c++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                if(r === 2 && c === 2) {
                    cell.innerHTML = '<i class="fas fa-star" style="color:#ffd700"></i>';
                    cell.classList.add('marked');
                } else {
                    let num;
                    do {
                        num = Math.floor(Math.random()*(ranges[c][1]-ranges[c][0]+1))+ranges[c][0];
                    } while(myCardNumbers.includes(num));
                    myCardNumbers.push(num);
                    cell.innerText = num;
                    cell.id = 'cell-' + num;
                    cell.onclick = () => markManual(num);
                }
                grid.appendChild(cell);
            }
        }
    }

    function markManual(num) {
        if(alreadyCalled.includes(num)) {
            const el = document.getElementById('cell-' + num);
            if(el) el.classList.add('marked');
        }
    }

    // ከServer መረጃ ሲመጣ
    socket.on('nextNumber', (data) => {
        alreadyCalled = data.calledNumbers;
        document.getElementById('calledNumber').innerText = 'N-' + data.number;
        document.getElementById('calledNumbersCount').innerText = alreadyCalled.length;
        
        if(isAutomatic && myCardNumbers.includes(data.number)) {
            const el = document.getElementById('cell-' + data.number);
            if(el) el.classList.add('marked');
        }
    });

    socket.on('updateStats', (data) => {
        if(data.playersCount) document.getElementById('playersCount').innerText = data.playersCount;
        if(data.derash) document.getElementById('derash').innerText = data.derash + ' ETB';
    });

    document.getElementById('autoBtn').onclick = function() {
        isAutomatic = !isAutomatic;
        this.classList.toggle('active');
        if(isAutomatic) {
            myCardNumbers.forEach(n => {
                if(alreadyCalled.includes(n)) {
                    const el = document.getElementById('cell-' + n);
                    if(el) el.classList.add('marked');
                }
            });
        }
    };

    // ሲጀመር ካርቴላ ይኑር
    generateBingoCard();
</script>
</body>
</html>
