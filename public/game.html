<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arif Bingo - Game Board</title>
    <style>
        :root { --primary: #1a237e; --accent: #d32f2f; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f5; margin: 0; text-align: center; }
        .stats-bar { display: grid; grid-template-columns: repeat(4, 1fr); background: #fff; padding: 10px; border-bottom: 2px solid #ddd; }
        .stat b { display: block; color: var(--primary); font-size: 0.9rem; }
        .timer-box { font-size: 2.5rem; color: var(--accent); font-weight: bold; margin: 20px 0; border: 3px solid var(--accent); display: inline-block; padding: 10px 20px; border-radius: 50%; width: 60px; height: 60px; line-height: 60px; }
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; padding: 15px; max-width: 380px; margin: 0 auto; }
        .cell { aspect-ratio: 1; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; border: 2px solid #ddd; cursor: pointer; font-size: 1.1rem; }
        .cell.selected { background: var(--accent) !important; color: white !important; border-color: var(--accent); }
        .cell.matched { background: #4caf50 !important; color: white !important; border-color: #4caf50; }
        .my-card-view { display: none; padding: 15px; }
        .card-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; background: white; padding: 15px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .small-cell { padding: 12px 5px; border: 1px solid #eee; font-size: 1rem; font-weight: bold; border-radius: 5px; background: #fff; }
        .audio-btn { background: #ffd700; border: none; padding: 12px 25px; border-radius: 25px; font-weight: bold; margin-bottom: 15px; cursor: pointer; font-size: 1.1rem; box-shadow: 0 3px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div class="stats-bar">
    <div class="stat">ID <b>#8543</b></div>
    <div class="stat">Players <b>24</b></div>
    <div class="stat">Prize <b>500</b></div>
    <div class="stat">Comm <b>10%</b></div>
</div>

<div id="setupScreen">
    <div class="timer-box" id="timerDisplay">50</div>
    <p style="font-weight: bold; color: #555;">እባክዎ 15 ቁጥሮችን ይምረጡ</p>
    <div id="mainBoard" class="grid"></div>
</div>

<div id="playScreen" class="my-card-view">
    <button class="audio-btn" id="audioCall">🔊 Listen: Wait...</button>
    <h3 style="color: var(--primary); margin-top: 0;">የእርስዎ ካርቴላ</h3>
    <div id="finalCardGrid" class="card-grid"></div>
</div>

<script>
    let userNumbers = [];
    const mainBoard = document.getElementById('mainBoard');
    
    // 1-75 ቁጥሮችን መፍጠር
    for (let i = 1; i <= 75; i++) {
        const cell = document.createElement('div');
        cell.className = 'cell';
        cell.innerText = i;
        cell.onclick = () => {
            if (userNumbers.length < 15 && !userNumbers.includes(i)) {
                userNumbers.push(i);
                cell.classList.add('selected');
            } else if (userNumbers.includes(i)) {
                userNumbers = userNumbers.filter(n => n !== i);
                cell.classList.remove('selected');
            }
        };
        mainBoard.appendChild(cell);
    }

    // 50 ሰከንድ ቆጣሪ
    let timeLeft = 50;
    const timer = setInterval(() => {
        timeLeft--;
        document.getElementById('timerDisplay').innerText = timeLeft;
        if (timeLeft <= 0) {
            clearInterval(timer);
            // 15 ቁጥር ካልመረጠ በራሱ መሙላት
            while(userNumbers.length < 15) {
                let r = Math.floor(Math.random() * 75) + 1;
                if(!userNumbers.includes(r)) userNumbers.push(r);
            }
            showPlayMode();
        }
    }, 1000);

    function showPlayMode() {
        document.getElementById('setupScreen').style.display = 'none';
        document.getElementById('playScreen').style.display = 'block';
        const grid = document.getElementById('finalCardGrid');
        
        userNumbers.sort((a,b) => a-b).forEach(n => {
            const div = document.createElement('div');
            div.className = 'small-cell';
            div.id = 'target-' + n;
            div.innerText = n;
            grid.appendChild(div);
        });

        // በየ 4 ሰከንዱ ቁጥር መጥራት
        let called = [];
        const gameAction = setInterval(() => {
            let next;
            do { next = Math.floor(Math.random() * 75) + 1; } while(called.includes(next));
            called.push(next);
            
            document.getElementById('audioCall').innerText = `🔊 Listen: B-${next}`;
            
            if (userNumbers.includes(next)) {
                const target = document.getElementById('target-' + next);
                target.classList.add('matched');
            }

            if (document.querySelectorAll('.matched').length === 15) {
                clearInterval(gameAction);
                alert("BINGO! በድጋሚ እንኳን ደስ አለዎት!");
            }
        }, 4000);
    }
</script>
</body>
</html>
