<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arif Bingo Live</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root { --bg: #2d1b17; --accent: #ffd700; --green: #4caf50; --panel: #4a2c26; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; text-align: center; }
        
        /* Header Bars */
        .bar { display: flex; justify-content: space-between; padding: 10px; background: rgba(0,0,0,0.4); align-items: center; }
        .stat-box { font-size: 0.7rem; color: #ccc; }
        .stat-box b { display: block; color: var(--accent); font-size: 0.9rem; }

        /* 1-75 Selection Board */
        .grid-75 { display: grid; grid-template-columns: repeat(10, 1fr); gap: 3px; padding: 10px; }
        .n-btn { aspect-ratio: 1; background: #5d4037; border: none; color: white; border-radius: 3px; font-size: 0.7rem; }
        .n-btn.active { background: var(--green); box-shadow: 0 0 8px var(--green); }
        .n-btn.called { background: var(--accent); color: black; }

        /* Game Card (B-I-N-G-O) */
        .bingo-card { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; background: white; padding: 5px; border-radius: 5px; margin: 10px; }
        .cell { width: 45px; height: 45px; background: #fffde7; color: #333; display: flex; align-items: center; justify-content: center; font-weight: bold; border-radius: 3px; }
        .cell.marked { background: var(--green) !important; color: white !important; }

        .hidden { display: none; }
    </style>
</head>
<body>

<div id="selectionHeader" class="bar">
    <button onclick="location.href='/'" style="background:none; border:none; color:white;"><i class="fas fa-arrow-left"></i></button>
    <div class="stat-box">Main Wallet<b id="mainW">1250</b></div>
    <div class="stat-box">Play Wallet<b id="playW">0</b></div>
    <div class="stat-box">Timer<b id="timer" style="color:red; font-size:1.2rem;">50</b></div>
    <button onclick="location.reload()" style="background:none; border:none; color:white;"><i class="fas fa-sync"></i></button>
</div>

<div id="playingHeader" class="bar hidden">
    <div class="stat-box">Game ID<b>#BBDDNWIX</b></div>
    <div class="stat-box">Players<b id="pCount">0</b></div>
    <div class="stat-box">Bet<b>10</b></div>
    <div class="stat-box">Derash<b id="derash">0</b></div>
    <div class="stat-box">Called<b id="calledCount">0</b></div>
</div>

<div id="selectionBody">
    <h4 id="msg">እባክዎ 15 ቁጥሮችን ይምረጡ</h4>
    <div class="grid-75" id="board75"></div>
</div>

<div id="playingBody" class="hidden">
    <div style="font-size: 3rem; margin: 20px; font-weight: bold; color: var(--accent);" id="currentNum">--</div>
    <div class="bingo-card" id="myCard"></div>
</div>

<script>
    const socket = io();
    let mySelected = [];
    let isGameOn = false;

    // 1-75 ቦርድ መፍጠር
    const board = document.getElementById('board75');
    for(let i=1; i<=75; i++){
        const b = document.createElement('button');
        b.className = 'n-btn'; b.id = 'btn-'+i; b.innerText = i;
        b.onclick = () => socket.emit('selectNumber', i);
        board.appendChild(b);
    }

    socket.on('stateUpdate', (state) => {
        document.getElementById('timer').innerText = state.timer;
        document.getElementById('derash').innerText = (Object.keys(state.players).length * 10) + " ETB";
        document.getElementById('pCount').innerText = Object.keys(state.players).length;

        if(state.phase === "PLAYING" && !isGameOn) {
            switchToPlayMode();
        }
    });

    socket.on('playerAction', (data) => {
        if(data.id === socket.id) {
            mySelected = data.selected;
            // ሁሉንም አጥፋና የተመረጡትን አረንጓዴ አድርግ
            document.querySelectorAll('.n-btn').forEach(b => b.classList.remove('active'));
            mySelected.forEach(n => document.getElementById('btn-'+n).classList.add('active'));
        }
    });

    socket.on('nextNumber', (data) => {
        document.getElementById('currentNum').innerText = data.number;
        document.getElementById('calledCount').innerText = data.list.length;
        if(mySelected.includes(data.number)) {
            const cell = document.getElementById('cell-'+data.number);
            if(cell) cell.classList.add('marked');
        }
    });

    function switchToPlayMode() {
        isGameOn = true;
        document.getElementById('selectionHeader').classList.add('hidden');
        document.getElementById('selectionBody').classList.add('hidden');
        document.getElementById('playingHeader').classList.remove('hidden');
        document.getElementById('playingBody').classList.remove('hidden');

        // ካርቴላውን መፍጠር
        const card = document.getElementById('myCard');
        mySelected.forEach(n => {
            const div = document.createElement('div');
            div.className = 'cell'; div.id = 'cell-'+n; div.innerText = n;
            card.appendChild(div);
        });
    }
</script>
</body>
</html>
