<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arif Bingo</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; background-color: #f0f2f5; margin: 0; padding: 20px; }
        h1 { color: #1a73e8; }
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; max-width: 350px; margin: 20px auto; background: white; padding: 15px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .cell { width: 60px; height: 60px; display: flex; align-items: center; justify-content: center; background-color: #e8f0fe; border: 2px solid #1a73e8; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 1.2rem; }
        .cell.marked { background-color: #34a853; color: white; border-color: #2d8e47; }
        .cell:hover { transform: scale(1.05); }
        button { padding: 12px 25px; font-size: 1rem; background-color: #1a73e8; color: white; border: none; border-radius: 5px; cursor: pointer; margin-top: 20px; }
        button:hover { background-color: #1557b0; }
    </style>
</head>
<body>

    <h1>🎰 Arif Bingo 🎰</h1>
    <div id="bingo-grid" class="grid"></div>
    <button onclick="generateNewGame()">አዲስ ጨዋታ ጀምር</button>

    <script>
        function generateNewGame() {
            const grid = document.getElementById('bingo-grid');
            grid.innerHTML = '';
            let numbers = Array.from({length: 75}, (_, i) => i + 1).sort(() => Math.random() - 0.5).slice(0, 25);
            
            numbers.forEach((num, index) => {
                const cell = document.createElement('div');
                cell.className = 'cell';
                if (index === 12) {
                    cell.innerText = 'FREE';
                    cell.classList.add('marked');
                } else {
                    cell.innerText = num;
                    cell.onclick = () => cell.classList.toggle('marked');
                }
                grid.appendChild(cell);
            });
        }
        generateNewGame();
    </script>
</body>
</html>
