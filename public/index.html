<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arif Bingo Business</title>
    <style>
        :root { --primary: #0d47a1; --gold: #ffd700; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); margin: 0; text-align: center; }
        
        /* User Profile Header */
        .user-header { background: var(--primary); color: white; padding: 20px; border-radius: 0 0 25px 25px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .balance-card { background: rgba(255,255,255,0.1); padding: 15px; border-radius: 15px; margin-top: 10px; }
        .balance-amount { font-size: 1.8rem; font-weight: bold; color: var(--gold); }

        /* Main Buttons Grid */
        .menu-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 20px; }
        .menu-item { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); text-decoration: none; color: #333; font-weight: bold; display: flex; flex-direction: column; align-items: center; cursor: pointer; transition: 0.3s; }
        .menu-item:active { transform: scale(0.95); }
        .menu-item i { font-size: 1.5rem; margin-bottom: 8px; }
        
        .start-btn { grid-column: span 2; background: linear-gradient(45deg, #1b5e20, #4caf50); color: white; font-size: 1.2rem; }
        .deposit-btn { color: #1a237e; }
        .invite-btn { color: #e91e63; }

        /* Stats Panel */
        .admin-stats { background: white; margin: 0 20px; padding: 15px; border-radius: 12px; display: flex; justify-content: space-around; font-size: 0.8rem; border: 1px solid #ddd; }
    </style>
</head>
<body>

<div class="user-header">
    <h3>እንኳን ደህና መጡ!</h3>
    <div class="balance-card">
        <span>ያለዎት ሂሳብ (Balance)</span>
        <div class="balance-amount">1,250.00 ETB</div>
    </div>
</div>

<div class="menu-grid">
    <button class="menu-item start-btn" onclick="openGame()">🎮 ጨዋታ ጀምር (Start)</button>
    <div class="menu-item deposit-btn" onclick="alert('Deposit Page Loading...')">💰 ብር አስገባ (Deposit)</div>
    <div class="menu-item" onclick="alert('Withdraw Page Loading...')">💸 ብር አውጣ (Withdraw)</div>
    <div class="menu-item invite-btn" onclick="alert('Invite Link Copied!')">👥 ጓደኛ ይጋብዙ (Invite)</div>
    <div class="menu-item" onclick="alert('History Loading...')">📜 ታሪክ (History)</div>
</div>

<div class="admin-stats">
    <div>የጨዋታ ቁጥር: <b>#8543</b></div>
    <div>ተጫዋቾች: <b>24</b></div>
    <div>ኮሚሽን: <b>10%</b></div>
</div>

<script>
    function openGame() {
        // ወደ ቢንጎ ሰንጠረዡ የሚወስድ ተግባር
        window.location.href = 'game.html'; 
    }
</script>

</body>
</html>
