<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arif Bingo Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #1a237e; --gold: #ffd700; --white: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; text-align: center; }
        .header { background: var(--primary); color: white; padding: 40px 20px; border-radius: 0 0 25px 25px; }
        .balance-card { background: rgba(255,255,255,0.1); padding: 20px; border-radius: 15px; margin-top: 10px; }
        .amount { font-size: 2.2rem; color: var(--gold); font-weight: bold; }
        .play-btn { background: #4caf50; color: white; border: none; padding: 20px; width: 90%; border-radius: 15px; font-size: 1.2rem; font-weight: bold; margin-top: 20px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="header">
        <h2>እንኳን ደህና መጡ!</h2>
        <div class="balance-card">
            <div>ያሎት ሂሳብ</div>
            <div class="amount">1,250.00 ETB</div>
        </div>
    </div>
    <button class="play-btn" onclick="window.location.href='game.html'">
        <i class="fas fa-play"></i> ጨዋታ ጀምር (Start Game)
    </button>
</body>
</html>
